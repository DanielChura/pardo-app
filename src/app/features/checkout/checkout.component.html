<section
  class="min-h-screen bg-[#fbfbfd] pt-32 pb-20 px-6 flex items-center justify-center font-sans"
>
  <div class="max-w-2xl w-full text-center">
    <!-- Encabezado sutil -->
    <header class="mb-20">
      <span class="text-[10px] uppercase tracking-[0.4em] text-gray-400 font-bold mb-4 block italic"
        >Review Selection</span
      >
      <h1 class="serif text-6xl md:text-8xl tracking-tighter italic leading-none">Confirm.</h1>
    </header>

    <!-- Resumen de Inversión -->
    <div class="bg-white rounded-[3rem] p-10 md:p-16 shadow-sm border border-black/5 mb-12">
      <div class="space-y-8 mb-12">
        <div
          class="flex justify-between text-xs uppercase tracking-widest text-gray-400 pb-6 border-b border-black/5"
        >
          <span>Total Pieces</span>
          <span class="text-black font-bold">{{ cartStore.count() }}</span>
        </div>

        <div class="flex flex-col items-center py-6">
          <span class="serif text-3xl mb-2 italic">Total Investment</span>
          <span class="text-6xl md:text-7xl font-light tracking-tighter italic">
            {{ cartStore.total() | currency: 'USD' : 'symbol' : '1.0-0' }}
          </span>
        </div>
      </div>

      <!-- Botón de Acción -->
      <button
        (click)="confirmOrder()"
        [disabled]="isProcessing() || cartStore.count() === 0"
        class="w-full bg-black text-white py-6 rounded-full text-xs uppercase tracking-[0.3em] font-bold hover:scale-[1.02] active:scale-95 transition-all shadow-2xl disabled:opacity-20 disabled:scale-100"
      >
        {{ isProcessing() ? 'Finalizing transaction...' : 'Place Order' }}
      </button>
    </div>

    <!-- Enlaces de navegación -->
    <div class="flex justify-center gap-12">
      <a
        routerLink="/cart"
        class="text-[10px] uppercase tracking-widest text-gray-400 hover:text-black transition-colors border-b border-transparent hover:border-black pb-1"
      >
        Edit collection
      </a>
      <a
        routerLink="/"
        class="text-[10px] uppercase tracking-widest text-gray-400 hover:text-black transition-colors border-b border-transparent hover:border-black pb-1"
      >
        Cancel
      </a>
    </div>
  </div>
</section>
