<main class="min-h-screen bg-[#FFFFFF] text-[#111111] pt-32 pb-12 px-6 flex items-center justify-center">
  <div class="max-w-md w-full">
    <header class="text-center mb-8">
      <span class="text-[11px] font-medium uppercase tracking-[0.18em]" style="color: var(--pardo);">
        Revisa tu selección
      </span>
      <h1 class="text-[36px] md:text-[42px] font-normal text-[#111111] leading-[1.15] mt-2" style="font-family: var(--font-serif);">
        Confirmar pedido
      </h1>
    </header>

    <article class="border mb-6" style="border-color: #EAEAEA; border-radius: 16px;">
      <div class="p-6" style="background: #F7F6F3;">
        <div class="flex justify-between items-center pb-4 mb-4" style="border-bottom: 1px solid #EAEAEA;">
          <span class="text-[13px]" style="color: #787774;">Total de piezas</span>
          <span class="text-[16px] font-medium">{{ cartStore.count() }}</span>
        </div>

        <div class="text-center py-2">
          <span class="text-[11px] uppercase tracking-[0.16em] block mb-2" style="color: #787774;">Total</span>
          <span class="text-[40px] font-normal text-[#111111]" style="font-family: var(--font-serif);">
            {{ cartStore.total() | currency: 'USD' : 'symbol' : '1.0-0' }}
          </span>
        </div>
      </div>

      <div class="p-6">
        <button
          (click)="confirmOrder()"
          [disabled]="isProcessing() || cartStore.count() === 0"
          class="w-full py-3 text-[12px] font-medium uppercase tracking-[0.18em] transition-all duration-300"
          [ngClass]="isProcessing() || cartStore.count() === 0 ? 'bg-[#EAEAEA] text-[#787774] cursor-not-allowed' : 'bg-[#111111] text-white hover:bg-[var(--pardo)]'"
          style="border-radius: 8px;"
        >
          {{ isProcessing() ? 'Procesando...' : 'Realizar pedido' }}
        </button>
      </div>
    </article>

    <nav class="flex justify-center gap-6">
      <a routerLink="/cart" class="text-[13px] hover:text-[var(--pardo)] transition-colors" style="color: #787774;">
        Editar selección
      </a>
      <a routerLink="/" class="text-[13px] hover:text-[var(--pardo)] transition-colors" style="color: #787774;">
        Cancelar
      </a>
    </nav>
  </div>
</main>
