<section class="w-full min-h-screen bg-[#FFFFFF] pt-40 md:pt-48 pb-12 flex flex-col items-center text-center px-6 md:px-12">
  <div class="max-w-4xl mx-auto flex flex-col items-center z-10 w-full">
    <h1 class="text-[48px] md:text-[72px] lg:text-[88px] font-normal text-[#111111] leading-[1.1] tracking-tight" style="font-family: var(--font-serif);">
      Sculpted for<br />the Modern Space
    </h1>
    
    <p class="mt-8 text-[16px] md:text-[18px] text-[#787774] max-w-2xl leading-relaxed">
      Descubrir una selección de piezas donde la forma se encuentra con la función absoluta. Diseñadas sin compromiso, fabricadas para generaciones.
    </p>

    <button 
      (click)="scrollToCollection()" 
      class="mt-12 bg-[#111111] text-white px-10 py-4 text-[12px] font-medium uppercase tracking-[0.18em] hover:bg-[var(--pardo)] transition-all duration-300"
      style="border-radius: 8px;"
    >
      Explore
    </button>
  </div>

  <div class="mt-20 md:mt-28 w-full max-w-[1400px] aspect-[4/3] md:aspect-[21/9] bg-[#F7F6F3] overflow-hidden" style="border-radius: 16px;">
    <img 
      src="https://www.shoprooof.com/wp-content/uploads/2025/09/241209_Rooof_Shot_08_Max-S_103_v4_2560-1.jpg.webp" 
      class="w-full h-full object-cover"
      alt="Espacio minimalista"
      loading="eager"
    />
  </div>
</section>
