<section class="bg-[#FFFFFF] py-28 px-6 md:px-12">
  <div class="max-w-[1600px] mx-auto">
    <div class="mb-20">
      <span class="text-[11px] font-medium uppercase tracking-[0.18em] text-[var(--pardo)]">
        Materiales
      </span>
      <h2 class="text-[44px] md:text-[56px] font-normal text-[#111111] leading-[1.15] mt-3">
        Our collection
      </h2>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-x-8 gap-y-16">
      @for (wood of woods(); track wood.id; let i = $index) {
        <article 
          class="flex flex-col group"
          [style.animation-delay]="(i * 80) + 'ms'"
        >
          <div 
            class="relative w-full aspect-square overflow-hidden bg-[#F7F6F3] mb-6"
            style="border-radius: 12px;"
          >
            @if (wood.imageUrl) {
              <img
                [src]="wood.imageUrl"
                [alt]="wood.name"
                class="w-full h-full object-cover transition-transform duration-800 ease-out group-hover:scale-[1.04]"
                loading="lazy"
              />
            } @else {
              <div class="w-full h-full flex items-center justify-center bg-[#F7F6F3]">
                <span class="text-[11px] uppercase tracking-[0.16em] text-[#787774]">
                  Sin imagen
                </span>
              </div>
            }
          </div>

          <div class="flex flex-col gap-1 text-center">
            <h3 class="text-[18px] font-normal text-[#111111] group-hover:text-[var(--pardo)] transition-colors duration-300" style="font-family: var(--font-serif);">
              {{ wood.name }}
            </h3>
            <span class="text-[10px] uppercase tracking-[0.16em] text-[#787774]">
              Madera premium
            </span>
          </div>
        </article>
      }
    </div>
  </div>
</section>
