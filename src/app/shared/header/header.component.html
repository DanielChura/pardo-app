<header
  class="fixed top-0 w-full z-50 px-6 md:px-12 py-5 flex justify-between items-center bg-[#FFFFFF] transition-all duration-300"
  [class.shadow-sm]="isScrolled()"
>
  <button
    class="p-2 hover:bg-[#F7F6F3] rounded-lg transition-colors cursor-pointer"
    aria-label="Menú"
  >
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="1.5">
      <path d="M3 12h18M3 6h18M3 18h18" />
    </svg>
  </button>

  <a
    routerLink="/"
    class="text-[22px] font-normal text-[#111111] hover:text-[var(--pardo)] transition-colors cursor-pointer"
    style="font-family: var(--font-serif)"
  >
    Pardo
  </a>

  <div class="flex items-center gap-1">
    @if (isLoggedIn()) {
      <a
        routerLink="/profile"
        class="p-2 hover:bg-[#F7F6F3] rounded-lg transition-colors cursor-pointer"
        aria-label="Perfil"
      >
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#111111"
          stroke-width="1.5"
        >
          <circle cx="12" cy="8" r="4" />
          <path d="M4 20c0-4 4-6 8-6s8 2 8 6" />
        </svg>
      </a>
    } @else {
      <a
        routerLink="/login"
        class="p-2 hover:bg-[#F7F6F3] rounded-lg transition-colors cursor-pointer"
        aria-label="Iniciar sesión"
      >
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#111111"
          stroke-width="1.5"
        >
          <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3" />
        </svg>
      </a>
    }

    <a
      routerLink="/cart"
      class="p-2 hover:bg-[#F7F6F3] rounded-lg transition-colors relative cursor-pointer"
      aria-label="Carrito"
    >
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="#111111"
        stroke-width="1.5"
      >
        <path d="M6 6h15l-1.5 9h-12z" />
        <circle cx="9" cy="20" r="1" />
        <circle cx="18" cy="20" r="1" />
        <path d="M6 6L5 3H2" />
      </svg>
      @if (cartStore.count() > 0) {
        <span
          class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-[var(--pardo)] text-white text-[9px] flex items-center justify-center rounded-full"
        >
          {{ cartStore.count() }}
        </span>
      }
    </a>
  </div>
</header>
